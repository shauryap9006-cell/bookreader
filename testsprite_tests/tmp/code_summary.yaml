version: "2"
type: frontend
tech_stack:
  - react
  - vite
  - tailwindcss
  - zustand
routes:
  - path: /
    file: src/App.jsx
    auth_required: false
    description: Main single page application managing views
features:
  - name: Dashboard View
    description: Main landing or dashboard view
    files:
      - src/components/Dashboard.jsx
    entry_route: /
    user_interactions:
      - View dashboard overview
    auth_required: false
  - name: Library Management
    description: Book library management
    files:
      - src/components/Library.jsx
    entry_route: /
    user_interactions:
      - View available books
    auth_required: false
  - name: Book Reader
    description: Book reading interface
    files:
      - src/components/Reader/Reader.jsx
    entry_route: /
    user_interactions:
      - Open a book to read
      - Trigger search with Ctrl+F
    auth_required: false
known_limitations: []
